<script>
(function () {
  'use strict';

  var cfg = null;     // from getConfigForClient
  var draft = null;   // from processUpload
  var titleNeedsConfirm = false, titleConfirm = null, titleOrig = '';

  var FLAG_TEXT = {
    verify_year: 'check year', year_not_found: 'no year found', verify_segmentation: 'check author/title split',
    authors_empty: 'no authors found', title_missing: 'no title found', source_empty: 'no source found',
    title_unquoted_guess: 'title was guessed', verify_author_has_url: 'URL in authors?',
    verify_long_span: 'unusually long', verify_title_quotes: 'check quotes', year_nonstandard: 'unusual year',
    single_token_name: 'one-word name', verify_name_particle: 'check name particle', verify_name_suffix: 'check suffix'
  };

  // ---- tiny DOM helpers ----
  function $(id) { return document.getElementById(id); }
  function el(tag, attrs, kids) {
    var n = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      if (k === 'class') n.className = attrs[k];
      else if (k === 'text') n.textContent = attrs[k];
      else n.setAttribute(k, attrs[k]);
    });
    (kids || []).forEach(function (c) { n.appendChild(c); });
    return n;
  }
  function banner(host, kind, msg) {
    $(host).appendChild(el('div', { class: 'banner ' + kind, text: msg }));
  }

  // ---- server bridge (real Apps Script, or a mock for the preview/demo) ----
  function serverCall(fn, arg, onOk, onErr) {
    if (window.google && google.script && google.script.run) {        // deployed Apps Script
      google.script.run.withSuccessHandler(onOk).withFailureHandler(function (e) {
        onErr(e && e.message ? e.message : String(e));
      })[fn](arg);
      return;
    }
    // Local real backend (python) if one is serving /api; otherwise the static mock (demo.html).
    fetch('/api/' + fn, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify(arg || {}) })
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (d) { onOk(d); })
      .catch(function () { setTimeout(function () { onOk(MOCK[fn](arg)); }, 200); }); // demo fallback
  }

  var MOCK = {
    getConfigForClient: function () {
      return {
        volumes: {
          '1': { type: 'project', sourcePreview: 'ACADIA 2026: Humanism Recoded [Project Catalog …]' },
          '2': { type: 'paper', sourcePreview: 'ACADIA 2026: Humanism Recoded [Proceedings of the 46th Annual Conference …]' }
        }, types: ['paper', 'project'], idPrefix: 'acadia26', idPad: 2, maxAuthors: 8
      };
    },
    processUpload: function (p) {
      return {
        ok: true,
        meta: { id: 'acadia26_v' + p.meta.vol + '_' + ('0' + p.meta.number).slice(-2), vol: p.meta.vol,
                number: String(p.meta.number), type: 'paper', email: p.meta.email, source: 'ACADIA 2026: …' },
        title: 'A Demonstration Paper on Computational Design',
        keywords: 'demo, parsing', authorOverflow: 0,
        authors: [{ first: 'Jane Q.', last: 'Smith', flags: [] }, { first: 'John', last: 'Doe', flags: [] }],
        references: [
          { authors: 'Fox, Michael and Miles Kemp', year: '2009', title: 'Interactive Architecture', source: 'New York: Princeton Architectural Press.', flags: ['title_unquoted_guess'], review: false },
          { authors: 'Brooks, Rodney A.', year: '1990', title: 'Elephants Don’t Play Chess', source: 'Robotics and Autonomous Systems 6 (1): 3–15.', flags: [], review: false },
          { authors: 'Google', year: '2025', title: 'Gemini 1.5 Pro in Google Docs', source: '2025. Accessed June 15, 2025.', flags: ['verify_year'], review: true }
        ],
        diagnostics: { styledRefCount: 3, usedFallback: false, titleFound: true, authorFound: true }
      };
    },
    commitSubmission: function (r) {
      return { ok: true, paperId: r.meta.id, titleRowsWritten: 1, refRowsWritten: (r.references || []).length };
    }
  };

  // ============================================================================
  // PDF extraction (client-side, via pdf.js) — ported from prototype/dryrun_pdf.py.
  // Produces {title, authorBlock, rawRefs} from the laid-out PDF; the SERVER then runs the
  // same parseReference()/splitAuthorBlock() it uses for .docx. Less reliable than .docx
  // (multi-column layout) — the review/gating step is the safety net.
  // ============================================================================
  var PDF_JUNK = /(computing for resil|^acadia\b|acadia team will fill|^\d{1,3}$|^topic\b|et al\.\s*\|)/i;
  var PDF_HEADING = /^(references|bibliography|works cited)\b/i;
  var PDF_BIO = /\b(is a|is an|is currently|is the head|holds a|received (his|her)|researches and teaches|is a university professor|earned (his|her))\b/i;
  var PDF_ENDS = /\.[”’"’�­]?\s*$/;
  var PDF_AUTHOR_START = /^(?:[A-Z][A-Za-z'’.\-]+,|[A-Z][A-Za-z&'’\-]+\.|[A-Z][A-Za-z'’\-]+ et al\.)/;
  var PDF_BOILER = /(leave this|do not delete|topic\s*\(acadia|acadia team will fill|computing for resil|^abstract\b|^keywords\b|^references\b)/i;

  function lineText(ln) {
    var t = '';
    for (var i = 0; i < ln.length; i++) {
      if (i > 0 && (ln[i].x0 - ln[i - 1].x1) > 1) t += ' ';
      t += ln[i].str;
    }
    return t.replace(/\s+/g, ' ').trim();
  }
  function centralCut(items, x0, x1, W) {
    var width = x1 - x0;
    var sub = items.filter(function (w) { return w.x0 >= x0 - 1 && w.x1 <= x1 + 1; });
    if (width < 170 || sub.length < 12) return null;
    var BINS = 160, bw = width / BINS, cover = [];
    for (var b = 0; b < BINS; b++) cover[b] = 0;
    sub.forEach(function (w) {
      var lo = Math.max(0, Math.floor((w.x0 - x0) / bw)), hi = Math.min(BINS - 1, Math.floor((w.x1 - x0) / bw));
      for (var k = lo; k <= hi; k++) cover[k]++;
    });
    var maxc = Math.max.apply(null, cover) || 1, thr = 0.04 * maxc;
    var loB = Math.floor(0.30 * BINS), hiB = Math.floor(0.70 * BINS);
    var bestLen = 0, bestMid = null, k = loB;
    while (k < hiB) {
      if (cover[k] <= thr) { var j = k; while (j < hiB && cover[j] <= thr) j++; if (j - k > bestLen) { bestLen = j - k; bestMid = (k + j) / 2; } k = j; }
      else k++;
    }
    var minBins = Math.max(2, Math.floor((0.008 * W) / bw));
    return (bestMid !== null && bestLen >= minBins) ? (x0 + bestMid * bw) : null;
  }
  function columnCuts(items, W) {
    if (items.length < 20) return [];
    var cuts = [];
    (function rec(x0, x1, depth) {
      if (depth > 1) return;
      var c = centralCut(items, x0, x1, W);
      if (c === null) return;
      rec(x0, c, depth + 1); cuts.push(c); rec(c, x1, depth + 1);
    })(0, W, 0);
    return cuts.sort(function (a, b) { return a - b; });
  }
  function colOf(x, cuts) { for (var i = 0; i < cuts.length; i++) if (x < cuts[i]) return i; return cuts.length; }
  function pageLines(items, W) {
    var cuts = columnCuts(items, W), out = [];
    for (var ci = 0; ci <= cuts.length; ci++) {
      var cw = items.filter(function (w) { return colOf(w.x0, cuts) === ci; });
      cw.sort(function (a, b) { return (Math.round(a.y / 3) - Math.round(b.y / 3)) || (a.x0 - b.x0); });
      var cur = [], cy = null, lines = [];
      cw.forEach(function (w) {
        if (cy === null || Math.abs(w.y - cy) <= 3) { cur.push(w); if (cy === null) cy = w.y; }
        else { lines.push(cur); cur = [w]; cy = w.y; }
      });
      if (cur.length) lines.push(cur);
      lines.forEach(function (ln) { ln.sort(function (a, b) { return a.x0 - b.x0; }); out.push(lineText(ln)); });
    }
    return out;
  }
  function itemsToLines(items) {
    var byY = {};
    items.forEach(function (w) { var key = Math.round(w.y / 3); (byY[key] = byY[key] || []).push(w); });
    return Object.keys(byY).map(function (key) {
      var ln = byY[key].sort(function (a, b) { return a.x0 - b.x0; });
      return { y: ln[0].y, size: Math.max.apply(null, ln.map(function (w) { return w.size; })), text: lineText(ln) };
    }).sort(function (a, b) { return a.y - b.y; });
  }
  function extractTitleAuthors(pageItems) {
    var best = null;
    for (var pi = 0; pi < Math.min(2, pageItems.length); pi++) {
      itemsToLines(pageItems[pi]).forEach(function (L) {
        if (L.y > 360 || L.text.length < 6 || PDF_BOILER.test(L.text)) return;
        if (best === null || L.size > best.size + 0.5) best = { size: L.size, text: L.text, page: pi, y: L.y };
      });
    }
    var authorBlock = '';
    if (best) {
      var below = itemsToLines(pageItems[best.page]).filter(function (L) { return L.y > best.y && L.y < best.y + 120; });
      var auth = [];
      for (var i = 0; i < below.length && auth.length < 3; i++) {
        if (/^(abstract|keywords|introduction)\b/i.test(below[i].text)) break;
        if (below[i].text.length >= 2 && below[i].size < best.size) auth.push(below[i].text);
      }
      authorBlock = auth.join(', ');
    }
    return { title: best ? best.text : '', authorBlock: authorBlock };
  }
  function joinEntry(lines) {
    var s = '';
    for (var i = 0; i < lines.length; i++) {
      if (i === 0) s = lines[i];
      else if (s.charAt(s.length - 1) === '­') s = s.slice(0, -1) + lines[i];
      else if (s.charAt(s.length - 1) === '-') s = s + lines[i];
      else s = s + ' ' + lines[i];
    }
    return s.replace(/\s+/g, ' ').trim();
  }
  function referencesFromLines(lines) {
    var start = null, inline = null;
    for (var i = 0; i < lines.length; i++) {
      var m = lines[i].match(PDF_HEADING);
      if (m) { start = i + 1; var rest = lines[i].slice(m[0].length).trim(); inline = rest || null; }
    }
    if (start === null) return [];
    var body = (inline ? [inline] : []).concat(lines.slice(start).filter(function (l) { return l && !PDF_JUNK.test(l); }));
    var entries = [], cur = [];
    for (var b = 0; b < body.length; b++) {
      var l = body[b];
      if (PDF_BIO.test(l) && !PDF_AUTHOR_START.test(l) && !/\b(19|20)\d{2}\b/.test(l)) break;
      var isStart = PDF_AUTHOR_START.test(l) && (cur.length === 0 || PDF_ENDS.test(cur[cur.length - 1]));
      if (isStart && cur.length) { entries.push(cur); cur = [l]; } else cur.push(l);
    }
    if (cur.length) entries.push(cur);
    return entries.map(joinEntry);
  }
  function arrayBufferToBase64(buf) {
    var bytes = new Uint8Array(buf), CH = 0x8000, bin = '';
    for (var i = 0; i < bytes.length; i += CH) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
    return btoa(bin);
  }
  function extractPdfClient(buf) {
    if (!window.pdfjsLib) return Promise.reject(new Error('PDF reader (pdf.js) did not load — check your connection, or upload the .docx.'));
    return pdfjsLib.getDocument({ data: buf }).promise.then(function (pdf) {
      var pageItems = [], allLines = [], seq = Promise.resolve();
      function doPage(pno) {
        return pdf.getPage(pno).then(function (page) {
          var vp = page.getViewport({ scale: 1 });
          return page.getTextContent().then(function (tc) {
            var items = tc.items.filter(function (it) { return it.str && it.str.trim(); }).map(function (it) {
              var x0 = it.transform[4], yb = it.transform[5];          // pdf.js: origin bottom-left
              return { str: it.str, x0: x0, x1: x0 + (it.width || 0), y: vp.height - yb, size: it.height || 0 };
            });
            pageItems.push(items);                                     // for title/authors (first pages)
            var body = items.filter(function (w) { return w.y > 40 && w.y < vp.height - 40; });
            allLines = allLines.concat(pageLines(body, vp.width));
          });
        });
      }
      for (var p = 1; p <= pdf.numPages; p++) { (function (pp) { seq = seq.then(function () { return doPage(pp); }); })(p); }
      return seq.then(function () {
        var ta = extractTitleAuthors(pageItems);
        return {
          title: ta.title, authorBlock: ta.authorBlock, keywords: '',
          rawRefs: referencesFromLines(allLines),
          diagnostics: { source: 'pdf', styledRefCount: 0, usedFallback: true,
                         titleFound: !!ta.title, titleFallback: true, authorFound: !!ta.authorBlock }
        };
      });
    });
  }

  // ---- Stage A ----
  function pad(n) {
    var s = String(parseInt(n, 10) || '');
    while (s && cfg && s.length < cfg.idPad) s = '0' + s;
    return s;
  }
  function updatePreview() {
    if (!cfg) return;
    var vol = $('track').value, num = $('number').value;
    var v = cfg.volumes[vol] || {};
    $('idPreview').textContent = num ? (cfg.idPrefix + '_v' + vol + '_' + pad(num)) : '—';
    $('typePreview').textContent = v.type || '—';
    $('srcPreview').textContent = v.sourcePreview ? ('SOURCE: ' + v.sourcePreview) : '';
  }

  function initStageA() {
    var sel = $('track');
    Object.keys(cfg.volumes).forEach(function (vol) {
      var v = cfg.volumes[vol];
      var label = v.type.charAt(0).toUpperCase() + v.type.slice(1) + ' — vol ' + vol;
      sel.appendChild(el('option', { value: vol, text: label }));
    });
    sel.value = '2'; // default: paper
    sel.addEventListener('change', updatePreview);
    $('number').addEventListener('input', updatePreview);
    $('uploadBtn').addEventListener('click', doUpload);
    updatePreview();
  }

  function doUpload() {
    $('bannerA').innerHTML = '';
    var file = $('file').files[0];
    var email = $('email').value.trim();
    var num = $('number').value;
    if (!num) return banner('bannerA', 'err', 'Please enter your Paper ID.');
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return banner('bannerA', 'err', 'Please enter a valid contact email.');
    if (!file) return banner('bannerA', 'err', 'Please choose your .docx or .pdf file.');
    var isPdf = /\.pdf$/i.test(file.name), isDocx = /\.docx$/i.test(file.name);
    if (!isPdf && !isDocx) return banner('bannerA', 'err', 'Please upload a Word .docx (recommended) or a PDF.');

    var btn = $('uploadBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Reading your paper…';
    var meta = { vol: $('track').value, number: num, email: email };
    function done() { btn.disabled = false; btn.textContent = 'Upload & parse references'; }
    function ok(data) { done(); if (!data || !data.ok) return banner('bannerA', 'err', (data && data.error) || 'Upload failed.'); draft = data; renderStageB(data); }
    function fail(msg) { done(); banner('bannerA', 'err', 'Upload failed: ' + msg); }

    var reader = new FileReader();
    reader.onerror = function () { fail('could not read the file.'); };
    if (isDocx) {
      reader.onload = function () {
        var res = reader.result, base64 = res.substring(res.indexOf(',') + 1);
        serverCall('processUpload', {
          base64: base64, filename: file.name,
          mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', meta: meta
        }, ok, fail);
      };
      reader.readAsDataURL(file);
    } else {                                          // PDF: extract in-browser, then send
      reader.onload = function () {
        var buf = reader.result, base64;
        try { base64 = arrayBufferToBase64(buf); }     // BEFORE pdf.js detaches the buffer
        catch (e) { return fail('could not read the PDF.'); }
        extractPdfClient(buf).then(function (pre) {
          serverCall('processUpload', {
            preExtracted: pre, base64: base64,
            filename: file.name, mimeType: 'application/pdf', meta: meta
          }, ok, fail);
        }).catch(function (e) { fail((e && e.message) || String(e)); });
      };
      reader.readAsArrayBuffer(file);
    }
  }

  // ---- Stage B ----
  function renderStageB(data) {
    $('banners').innerHTML = '';
    $('bannerB').innerHTML = '';
    var d = data.diagnostics || {};
    if (d.source === 'pdf') {
      banner('banners', 'warn', 'You uploaded a PDF — extracting references from a PDF is approximate, so please check every row carefully. (A Word .docx gives the most accurate result.)');
    } else if (d.usedFallback || d.styledRefCount === 0) {
      banner('banners', 'warn', 'We could not find references in the ACADIA-Reference style, so we detected them automatically — please check the list carefully.');
    }
    if (d.titleFallback) banner('banners', 'warn', 'We detected your title automatically (the ACADIA-Title style wasn’t applied) — please verify it.');
    else if (!d.titleFound) banner('banners', 'warn', 'We could not detect your title — please enter it below.');
    if (!d.authorFound) banner('banners', 'warn', 'We could not detect author names in the document — please add them below.');
    if (data.authorOverflow > 0) banner('banners', 'warn', 'More than ' + cfg.maxAuthors + ' authors were detected; only the first ' + cfg.maxAuthors + ' are kept (CumInCAD limit).');

    $('idB').textContent = data.meta.id;
    $('typeB').textContent = 'type: ' + data.meta.type;
    $('title').value = data.title || '';
    titleNeedsConfirm = !!d.titleFallback;
    setupTitleConfirm(data.title || '');

    var atb = $('authorsTable').getElementsByTagName('tbody')[0];
    atb.innerHTML = '';
    var authors = (data.authors && data.authors.length) ? data.authors : [{ first: '', last: '' }];
    authors.forEach(function (a) { atb.appendChild(authorRow(a)); });

    var rtb = $('refsTable').getElementsByTagName('tbody')[0];
    rtb.innerHTML = '';
    (data.references || []).forEach(function (r) { rtb.appendChild(refRow(r)); });
    renumber();
    updateCounts();

    $('stageA').hidden = true;
    $('stageB').hidden = false;
    $('addAuthor').onclick = function () { atb.appendChild(authorRow({ first: '', last: '' })); };
    $('addRef').onclick = function () { rtb.appendChild(refRow({ authors: '', year: '', title: '', source: '', review: false })); renumber(); updateCounts(); };
    $('submitBtn').onclick = doSubmit;
    $('backBtn').onclick = function () { location.reload(); };
    window.scrollTo(0, 0);
  }

  function inputCell(value, cls, multiline) {
    var node = multiline ? el('textarea', { rows: '2' }) : el('input', { type: 'text' });
    node.value = value || '';
    if (cls) node.className = cls;
    return el('td', null, [node]);
  }
  function removeCell(onClick) {
    var b = el('button', { class: 'danger tiny', title: 'remove', text: '×' });
    b.addEventListener('click', onClick);
    return el('td', { class: 'col-rm' }, [b]);
  }

  function authorRow(a) {
    var tr = el('tr');
    tr.appendChild(inputCell(a.first, null, false));
    tr.appendChild(inputCell(a.last, null, false));
    tr.appendChild(removeCell(function () { tr.parentNode.removeChild(tr); }));
    if (a.flags && a.flags.length) tr.className = 'review';
    return tr;
  }

  function refRow(r) {
    var tr = el('tr');
    tr._flagged = !!(r.flags && r.flags.length);   // ANY flag (incl. "title was guessed") needs edit-or-confirm
    tr.appendChild(el('td', { class: 'num' }));                       // # (filled by renumber)
    var authorsTd = inputCell(r.authors, null, true);
    if (r.flags && r.flags.length) {
      var tips = r.flags.map(function (f) { return FLAG_TEXT[f] || f; }).join(' · ');
      authorsTd.appendChild(el('div', { class: 'flagtip', text: '⚠ ' + tips }));
    }
    if (tr._flagged) {
      var line = el('label', { class: 'confirmline' });
      var cb = el('input', { type: 'checkbox' });
      cb.addEventListener('change', function () { refreshRow(tr); });
      line.appendChild(cb);
      line.appendChild(el('span', { text: 'edit a field, or tick to confirm it’s correct' }));
      tr._confirm = cb;
      authorsTd.appendChild(line);
    }
    tr.appendChild(authorsTd);
    tr.appendChild(inputCell(r.year, 'col-year', false));
    tr.appendChild(inputCell(r.title, null, true));
    tr.appendChild(inputCell(r.source, null, true));
    tr.appendChild(removeCell(function () { tr.parentNode.removeChild(tr); renumber(); updateCounts(); }));

    // the four editable fields, for empty-checks and edit detection
    tr._fields = [tr.cells[1].querySelector('textarea'), tr.cells[2].querySelector('input'),
                  tr.cells[3].querySelector('textarea'), tr.cells[4].querySelector('textarea')];
    tr._fields.forEach(function (inp) {
      inp._orig = inp.value;
      inp.addEventListener('input', function () { inp.classList.remove('empty'); refreshRow(tr); });
    });
    refreshRow(tr);
    return tr;
  }

  function renumber() {
    var rows = $('refsTable').getElementsByTagName('tbody')[0].rows;
    for (var i = 0; i < rows.length; i++) rows[i].cells[0].textContent = (i + 1);
  }
  function updateCounts() {
    var rows = $('refsTable').getElementsByTagName('tbody')[0].rows;
    var pending = 0;
    for (var i = 0; i < rows.length; i++) if (rows[i]._flagged && !rowResolved(rows[i])) pending++;
    $('refCounts').textContent = rows.length + ' reference' + (rows.length === 1 ? '' : 's') +
      (pending ? ' · ' + pending + ' still need a check (edit or tick)' : (rows.length ? ' · all reviewed' : ''));
  }

  // ---- "edit or confirm" resolution for flagged rows / the auto-detected title ----
  function rowEdited(tr) { return (tr._fields || []).some(function (i) { return i.value !== i._orig; }); }
  function rowResolved(tr) {
    if (!tr._flagged) return true;
    return (tr._confirm && tr._confirm.checked) || rowEdited(tr);
  }
  function refreshRow(tr) {
    if (!tr._flagged) return;
    var ok = rowResolved(tr);
    tr.classList.toggle('review', !ok);
    tr.classList.toggle('resolved', ok);
    updateCounts();
  }
  function setupTitleConfirm(orig) {
    titleOrig = orig;
    var old = document.getElementById('titleConfirmWrap'); if (old) old.remove();
    var t = $('title'); t.classList.remove('empty');
    if (!titleNeedsConfirm) { titleConfirm = null; return; }
    var wrap = el('label', { class: 'confirmline', id: 'titleConfirmWrap' });
    titleConfirm = el('input', { type: 'checkbox' });
    wrap.appendChild(titleConfirm);
    wrap.appendChild(el('span', { text: 'auto-detected — edit it, or tick to confirm it’s right' }));
    t.parentNode.appendChild(wrap);
    titleConfirm.addEventListener('change', function () { wrap.classList.toggle('done', titleResolved()); });
    t.addEventListener('input', function () { t.classList.remove('empty'); wrap.classList.toggle('done', titleResolved()); });
  }
  function titleResolved() {
    if (!titleNeedsConfirm) return true;
    return (titleConfirm && titleConfirm.checked) || ($('title').value !== titleOrig);
  }

  function doSubmit() {
    $('bannerB').innerHTML = '';
    document.querySelectorAll('.empty').forEach(function (e) { e.classList.remove('empty'); });

    // ---- title: non-empty + (if auto-detected) edited or confirmed ----
    var titleVal = $('title').value.trim();
    if (!titleVal) { $('title').classList.add('empty'); return banner('bannerB', 'err', 'Please enter a title.'); }
    if (!titleResolved()) return banner('bannerB', 'err', 'Please review the auto-detected title — edit it, or tick the confirm box.');

    // ---- authors: each present row needs first AND last ----
    var authors = [], authorIncomplete = 0;
    var arows = $('authorsTable').getElementsByTagName('tbody')[0].rows;
    for (var i = 0; i < arows.length; i++) {
      var fi = arows[i].cells[0].firstChild, li = arows[i].cells[1].firstChild;
      var f = fi.value.trim(), l = li.value.trim();
      if (!f && !l) continue;                                  // empty row → ignore
      if (!f) fi.classList.add('empty');
      if (!l) li.classList.add('empty');
      if (!f || !l) authorIncomplete++;
      authors.push({ first: f, last: l });
    }
    if (!authors.length) return banner('bannerB', 'err', 'Please enter at least one author (first and last name).');
    if (authorIncomplete) return banner('bannerB', 'err', 'Each author needs both a first and last name (highlighted).');

    // ---- references: no empty fields + every flagged row resolved ----
    var rrows = $('refsTable').getElementsByTagName('tbody')[0].rows;
    var emptyN = 0, pendingN = 0, firstBad = null, refs = [];
    for (var j = 0; j < rrows.length; j++) {
      var tr = rrows[j];
      var vals = tr._fields.map(function (inp) { return inp.value.trim(); });
      var filled = vals.filter(function (v) { return v; }).length;
      if (filled === 0) continue;                              // blank row → ignore
      if (filled < 4) {
        tr._fields.forEach(function (inp) { if (!inp.value.trim()) inp.classList.add('empty'); });
        emptyN++; firstBad = firstBad || tr;
      }
      if (tr._flagged && !rowResolved(tr)) { pendingN++; firstBad = firstBad || tr; }
      refs.push({ authors: vals[0], year: vals[1], title: vals[2], source: vals[3] });
    }
    if (!refs.length) return banner('bannerB', 'err', 'Please add at least one reference.');
    if (emptyN || pendingN) {
      var parts = [];
      if (emptyN) parts.push(emptyN + ' reference' + (emptyN > 1 ? 's have' : ' has') + ' an empty field');
      if (pendingN) parts.push(pendingN + ' flagged reference' + (pendingN > 1 ? 's' : '') + ' still need a check');
      banner('bannerB', 'err', 'Can’t submit yet — ' + parts.join('; ') + '. Fill every column and resolve the highlighted rows.');
      if (firstBad) firstBad.scrollIntoView({ block: 'center', behavior: 'smooth' });
      return;
    }

    var reviewed = { meta: draft.meta, title: titleVal, authors: authors, references: refs };
    var btn = $('submitBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Submitting…';
    serverCall('commitSubmission', reviewed, function (res) {
      btn.disabled = false; btn.textContent = 'Confirm & submit to index';
      if (!res || !res.ok) {
        if (res && res.error === 'duplicate_id') return banner('bannerB', 'err', 'This paper ID is already indexed. Contact the editors if you need to update it.');
        return banner('bannerB', 'err', (res && res.error) || 'Submission failed.');
      }
      $('stageB').hidden = true;
      var done = $('done'); done.hidden = false;
      done.appendChild(el('div', { class: 'banner ok',
        text: 'Saved — ' + res.paperId + ': 1 paper row and ' + res.refRowsWritten + ' reference rows added to the index. Thank you!' }));
    }, function (msg) {
      btn.disabled = false; btn.textContent = 'Confirm & submit to index';
      banner('bannerB', 'err', 'Submission failed: ' + msg);
    });
  }

  // ---- boot ----
  serverCall('getConfigForClient', null, function (c) {
    cfg = c; initStageA();
  }, function (msg) {
    banner('bannerA', 'err', 'Could not load configuration: ' + msg);
  });
})();
</script>
